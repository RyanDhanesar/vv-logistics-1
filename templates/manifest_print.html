<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LOAD MANIFEST - {{ trip_id }}</title>
    <style>
        /* 1. Reset and Global Styles */
        body { padding: 0; margin: 0; background-color: #f8f9fa; color: #333; font-family: 'Helvetica', 'Arial', sans-serif; }
        
        /* 2. Professional Navigation Bar (Invisible on Print) */
        .no-print-nav {
            background: #343a40;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 3. Paper Simulation for Screen */
        .manifest-container { 
            max-width: 850px; 
            margin: 30px auto; 
            background: white; 
            padding: 50px; 
            border: 1px solid #ddd; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
            min-height: 1000px;
        }

        /* 4. Document Elements */
        .manifest-header { display: flex; justify-content: space-between; border-bottom: 3px solid #333; padding-bottom: 15px; margin-bottom: 30px; }
        .manifest-title { font-size: 28px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f2f2f2; text-align: left; padding: 12px; border: 1px solid #333; font-size: 11px; text-transform: uppercase; }
        td { padding: 12px; border: 1px solid #ddd; font-size: 13px; vertical-align: top; }

        .signatory-section { margin-top: 80px; display: flex; justify-content: space-between; }
        .sig-box { width: 40%; border-top: 2px solid #333; padding-top: 10px; text-align: center; font-size: 12px; font-weight: bold; }
        
        .stamp-area { border: 2px dashed #ccc; width: 130px; height: 130px; display: flex; align-items: center; text-align: center; color: #bbb; font-size: 10px; border-radius: 50%; margin-top: 40px; text-transform: uppercase; }

        /* 5. Printer Magic */
        @media print {
            .no-print, .no-print-nav { display: none !important; }
            body { background-color: white !important; }
            .manifest-container { 
                margin: 0 !important; 
                padding: 0 !important; 
                border: none !important; 
                box-shadow: none !important; 
                max-width: 100% !important; 
            }
            @page { margin: 1.5cm; }
        }
    </style>
</head>
<body>

    <div class="no-print-nav">
        <div>
            <button onclick="window.location.href='/driver'" style="cursor:pointer; padding: 8px 20px; border-radius: 4px; border: none; background: #6c757d; color: white; font-weight: bold;">
                ← BACK TO PORTAL
            </button>
        </div>
        <div style="font-size: 14px;">
            <span style="color: #ffc107;">●</span> <strong>PREVIEW MODE:</strong> Manifest {{ trip_id }}
        </div>
        <div>
            <button onclick="window.print()" style="cursor:pointer; padding: 8px 20px; border-radius: 4px; border: none; background: #28a745; color: white; font-weight: bold;">
                PRINT MANIFEST (PDF)
            </button>
        </div>
    </div>

    <div class="manifest-container">
        
        <div class="manifest-header">
            <div>
                <div class="manifest-title">Delivery Manifest</div>
                <div style="font-size: 16px; margin-top: 5px;">Reference: <strong>{{ trip_id }}</strong></div>
                <div style="font-size: 12px; color: #666; margin-top: 5px;">Generated: <span id="currentDate"></span></div>
            </div>
            <div style="text-align: right;">
                <div style="font-weight: bold; font-size: 20px; color: #000;">V&V LOGISTICS</div>
                <div style="font-size: 12px; color: #555;">Warehouse Operations Terminal</div>
                <div style="font-size: 11px; color: #777; margin-top: 5px;">Industrial Park, South Africa</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 25%;">Area / Branch</th>
                    <th style="width: 40%;">Description</th>
                    <th style="width: 15%; text-align: center;">Qty</th>
                    <th style="width: 20%;">Notes</th>
                </tr>
            </thead>
            <tbody id="manifestBody">
                </tbody>
        </table>

        <div class="signatory-section">
            <div class="sig-box">
                AUTHORIZED DRIVER SIGNATURE
            </div>
            <div class="sig-box">
                RECEIVER NAME & SIGNATURE
            </div>
        </div>

        <div class="stamp-area">
            OFFICIAL<br>WAREHOUSE<br>DISPATCH STAMP
        </div>
    </div>

    <script>
        // Set live date
        document.getElementById('currentDate').innerText = new Date().toLocaleString();

        // Pull the specific data for this manifest from local storage
        const allData = JSON.parse(localStorage.getItem('masterOrders')) || [];
        const tripItems = allData.filter(o => o.Status === 'LOADED' && o.TripID === '{{ trip_id }}');

        const body = document.getElementById('manifestBody');
        if (tripItems.length === 0) {
            body.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 50px;">No items found. Ensure trip is verified in Dispatch.</td></tr>';
        } else {
            body.innerHTML = tripItems.map(item => {
                // Determine description key dynamically
                const desc = item.description || Object.values(item)[2] || 'N/A';
                return `
                <tr>
                    <td><strong>${item.Area}</strong></td>
                    <td>${desc}</td>
                    <td style="text-align: center; font-weight: bold; font-size: 16px;">${item.Final_Loaded || item.staged_qty}</td>
                    <td style="font-size: 11px; color: #555; font-style: italic;">${item.Note || ''}</td>
                </tr>
            `}).join('');
        }
    </script>
</body>
</html>
